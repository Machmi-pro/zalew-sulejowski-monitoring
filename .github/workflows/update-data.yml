name: Aktualizacja danych zbiornika Sulejów

on:
  schedule:
    # UWAGA: godzina jest w UTC!
    # 0 11 * * * -> 11:00 UTC = 13:00 czasu polskiego (CEST, lato) / 12:00 (CET, zima)
    - cron: '20 09 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  aktualizuj:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Pythona
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj zależności
        run: pip install requests pdfplumber numpy

      - name: Uruchom skrypt pobierający dane
        run: python scripts/pobierz.py

      - name: Wylicz rzędną
        run: python scripts/oblicz_rzedna.py

      - name: Zapisz zmiany w repozytorium
        run: |
          git config user.name "sulejow-bot"
          git config user.email "sulejow-bot@users.noreply.github.com"
          git add data/sulejow.json data/rzedna_wyliczenie.json
          git diff --quiet --cached || git commit -m "Automatyczna aktualizacja danych zbiornika Sulejów"
          git pull --rebase origin main
          git push
